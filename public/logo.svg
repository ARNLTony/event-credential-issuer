<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Ticket/badge body -->
  <rect x="6" y="10" width="36" height="28" rx="4" stroke="#f0a500" stroke-width="2.5" fill="none"/>
  <!-- Ticket notch left -->
  <circle cx="6" cy="24" r="4" fill="#1a1a2e" stroke="#f0a500" stroke-width="2.5"/>
  <!-- Ticket notch right -->
  <circle cx="42" cy="24" r="4" fill="#1a1a2e" stroke="#f0a500" stroke-width="2.5"/>
  <!-- Dashed divider -->
  <line x1="16" y1="10" x2="16" y2="38" stroke="#f0a500" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5"/>
  <!-- Checkmark circle -->
  <circle cx="30" cy="24" r="8" fill="#f0a500" opacity="0.15"/>
  <circle cx="30" cy="24" r="8" stroke="#f0a500" stroke-width="2"/>
  <!-- Checkmark -->
  <path d="M26 24l2.5 2.5L33 22" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
